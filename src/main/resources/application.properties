# --- Datasource (não commite senhas; use .env ou variáveis no Render) ---
quarkus.datasource.db-kind=postgresql
quarkus.devservices.enabled=false

# Dev: ajuste localhost se seu Postgres local for outro host/porta/db
%dev.quarkus.datasource.jdbc.url=${DB_JDBC_URL:jdbc:postgresql://localhost:5432/postgres}
%dev.quarkus.datasource.username=${DB_USERNAME:postgres}
%dev.quarkus.datasource.password=${DB_PASSWORD:postgres}

# Prod (Render etc.): obrigatório definir DB_JDBC_URL, DB_USERNAME, DB_PASSWORD no painel
%prod.quarkus.datasource.jdbc.url=${DB_JDBC_URL}
%prod.quarkus.datasource.username=${DB_USERNAME}
%prod.quarkus.datasource.password=${DB_PASSWORD}
# Primeira conexão (cold start / rede) — evita timeout curto na subida
%prod.quarkus.datasource.jdbc.acquisition-timeout=60S

# Hibernate: substitui quarkus.hibernate-orm.database.generation (deprecated)
quarkus.hibernate-orm.schema-management.strategy=update

# CORS (dev / Vite)
%dev.quarkus.http.cors.enabled=true
%dev.quarkus.http.cors.origins=http://localhost:5173,http://127.0.0.1:5173
%dev.quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
%dev.quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with

quarkus.http.host=0.0.0.0
quarkus.http.port=${PORT:8080}

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=https://az-construct-flow.vercel.app
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
