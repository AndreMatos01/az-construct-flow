# --- Datasource ---
# Dev: DB_* e APP_DB_SCHEMA podem vir do `.env` na raiz (Quarkus carrega em quarkus:dev).
# Postgres local: `docker compose up -d` e comente/remova DB_* no .env para usar localhost:5432.
# Prod: application-prod.properties + variáveis no Render (DB_*, CORS_ORIGINS, APP_DB_SCHEMA se precisar).
quarkus.datasource.db-kind=postgresql
# Dev Services desligado: usamos Postgres explícito (compose ou remoto via DB_*).
quarkus.devservices.enabled=false

%dev.quarkus.datasource.jdbc.url=${DB_JDBC_URL:jdbc:postgresql://localhost:5432/postgres}
%dev.quarkus.datasource.username=${DB_USERNAME:postgres}
%dev.quarkus.datasource.password=${DB_PASSWORD:postgres}

# Hibernate: substitui quarkus.hibernate-orm.database.generation (deprecated)
quarkus.hibernate-orm.schema-management.strategy=update
# Neon / PG15+ com "permission denied for schema public": crie um schema (ex.: azcf) e defina APP_DB_SCHEMA=azcf — ver .env.example
quarkus.hibernate-orm.database.default-schema=${APP_DB_SCHEMA:public}

# CORS (dev / Vite)
%dev.quarkus.http.cors.enabled=true
%dev.quarkus.http.cors.origins=http://localhost:5173,http://127.0.0.1:5173
%dev.quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
%dev.quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with

quarkus.http.host=0.0.0.0
quarkus.http.port=${PORT:8080}

quarkus.http.cors.enabled=true
# Vários domínios: separados por vírgula (ex.: produção + previews Vercel). Defina CORS_ORIGINS no Render.
quarkus.http.cors.origins=${CORS_ORIGINS:https://az-construct-flow.vercel.app}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
