# Perfil prod (ex.: Render + Neon). Obrigatório: DB_JDBC_URL, DB_USERNAME, DB_PASSWORD.
#
# Neon — além das credenciais:
# - URL com sslmode=require (a connection string do painel já inclui em muitos casos).
# - Host *-pooler* (PgBouncer): na JDBC acrescente prepareThreshold=0 para evitar erros com prepared statements, ex.:
#   ...neondb?sslmode=require&prepareThreshold=0
# - Limite de conexões do plano: o pool abaixo mantém uso modesto (ajuste DB_POOL_MAX se o plano permitir).
# - Schema "public" restrito: defina APP_DB_SCHEMA (ex.: azcf) e crie o schema no SQL Editor da Neon.
# - CORS: defina CORS_ORIGINS no mesmo serviço com a origem do frontend (Vercel), separada por vírgulas.

quarkus.datasource.jdbc.url=${DB_JDBC_URL}
quarkus.datasource.username=${DB_USERNAME}
quarkus.datasource.password=${DB_PASSWORD}
quarkus.datasource.jdbc.acquisition-timeout=60S
quarkus.datasource.jdbc.max-size=${DB_POOL_MAX:8}
